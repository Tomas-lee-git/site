<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <title>eastwoodli</title>
    <script src="../../scripts/clock.js"></script>
    <link rel="stylesheet" href="../../styles/container.css">
    <link rel="stylesheet" href="../../styles/clock.css">
</head>

<body>
    <div class="container">
        <h3>💪N2考试倒计时💪</h3>
        <h4><a href="../index.html">Back to home</a></h4>
        <div id="clockdiv">
            <div>
                <span class="days"></span>
                <div class="smalltext">天</div>
            </div>
            <div>
                <span class="hours"></span>
                <div class="smalltext">时</div>
            </div>
            <div>
                <span class="minutes"></span>
                <div class="smalltext">分</div>
            </div>
            <div>
                <span class="seconds"></span>
                <div class="smalltext">秒</div>
            </div>
        </div>
    </div>
    <script type="text/javascript">
        const date = "December 10, 2024 8:00:00"
        const deadline = new Date(Date.parse(new Date(date)));
        initializeClock('clockdiv', deadline);
    </script>
</body>

</html>
