<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自行车出售</title>
</head>
<style>
    .sale-content {
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .important-info {
        font-weight: 600;
    }

    .photo {
        margin-left: 100px;
    }
</style>

<body>
    <div class="sale-content">
        <h3>优惠出售山地自行车一辆</h3>
        <div class="desc">
            <ul>
                <li>型号：捷安特 <span class="important-info">ATX810</span> ；</li>
                <li>售价：出售价 <span class="important-info">1000¥（单车）or 1100¥（带配件）</span> ；</li>
                <li>使用程度：使用半年，后面一直在房子里闲置；</li>
                <li>原价：在科技路华润超市的捷安特专卖店买的，原价1400¥；</li>
                <li>另有：车灯（30¥）、气筒（70¥）、车锁（200¥）、雨衣（50¥）、头盔（150¥）等附件，
                    <span class="important-info">原价约500¥，打包价100¥（总价1100¥）；</span>
                </li>
                <li>tips：觉着讲价麻烦，售价已经很有诚意了，讨价还价还是别了吧🥹</li>
            </ul>
        </div>
        <div class="photo">
            <p>车子在新长安广场附近，有兴趣可约线下看车</p>
            <img src="./img/ATX810.jpeg" alt="">
        </div>
    </div>
</body>

</html>
